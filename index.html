<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>AV Marketing OS</title>
<meta name="description" content="All Volleyball internal marketing operations system. Accounts, rocks, June plan, campaigns, promos, budget, automation, content.">
<link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

  <!-- STATUS BAR -->
  <header class="statusbar">
    <div class="sb-mark">
      <span class="tick"></span>
      ALL VOLLEYBALL
      <small>MARKETING OS</small>
    </div>
    <div class="sb-right">
      <span class="qtr">Q2</span>
      <span class="last-sync"><span class="sync-dot"></span>SEED</span>
      <span class="clock" id="clock">--:--:--</span>
    </div>
  </header>

  <!-- LEFT DOCK -->
  <nav class="dock">
    <button class="dock-home on" id="dock-home" title="Home" aria-label="Home"></button>
    <span class="dock-spacer"></span>
    <span class="dock-clock" id="dock-clock">Q2 OPS</span>
    <span class="dock-tick"></span>
  </nav>

  <!-- STAGE -->
  <div class="stage">
    <section class="springboard" id="springboard"></section>
    <section class="app-screen" id="app-screen"><div class="app-screen-inner" id="app-inner"></div></section>
  </div>

  <script src="data.js?v=4"></script>
  <script src="june.js?v=4"></script>
  <script src="accounts.js?v=4"></script>
  <script src="metrics.js?v=4"></script>
  <script src="scanner.js?v=4"></script>
  <script src="connectors.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
